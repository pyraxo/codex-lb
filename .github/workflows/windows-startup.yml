name: Windows Startup Regression

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-windows-startup:
    name: Windows startup regression
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run memory monitor regression tests
        run: uv run pytest tests/unit/test_memory_monitor.py

      - name: Smoke import application startup path
        run: uv run python -c "from app.main import create_app; app = create_app(); assert app is not None"
