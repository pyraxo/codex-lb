services:
  codex-lb:
    build:
      context: .
      dockerfile: Dockerfile
    image: pyraxo/codex-lb:local
    container_name: codex-lb
    env_file:
      - .env.local
    ports:
      - "2455:2455"
      - "1455:1455"
    volumes:
      - codex-lb-data:/var/lib/codex-lb
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:2455/health/ready')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  codex-lb-data:
    name: codex-lb-data
